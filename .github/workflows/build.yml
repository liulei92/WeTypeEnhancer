name: Build APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:       # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 接受 Android SDK 许可证
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: 安装 API 37
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-37" "build-tools;37.0.0" > /dev/null 2>&1 || true

      - name: 赋予 Gradle Wrapper 执行权限
        run: chmod +x gradlew

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: WeType-UI-Enhanced-Debug
          path: app/build/outputs/apk/debug/*.apk

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WeType-UI-Enhanced-Release
          path: app/build/outputs/apk/release/*.apk

  # 创建 Release 版本（仅在推送 tag 时触发）
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载 Debug APK
        uses: actions/download-artifact@v4
        with:
          name: WeType-UI-Enhanced-Debug
          path: apk-debug

      - name: 下载 Release APK
        uses: actions/download-artifact@v4
        with:
          name: WeType-UI-Enhanced-Release
          path: apk-release

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apk-debug/*.apk
            apk-release/*.apk
          generate_release_notes: true
